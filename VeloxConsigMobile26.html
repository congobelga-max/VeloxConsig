<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<title>VeloxConsig CRM Mobile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    background:#f4f5f7;
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    padding-bottom:30px;
}

header{

	background:#000000;
    padding:20px 15px;

    text-align:center;

    border-bottom:2px solid #ff6b00;

    box-shadow:0 3px 12px rgba(0,0,0,.45);

}
header img{

    width:180px;

    max-width:90%;

    height:auto;

    display:block;

    margin:auto;

}
.container-fluid{
    padding:15px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-bottom:20px;
}

.cardDash{
    background:white;
    border-radius:15px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.cardDash h2{
    margin:0;
    font-size:26px;
    color:#ff6b00;
}

.cardDash span{
    font-size:13px;
    color:#666;
}

.importar{

    display:flex;

    gap:10px;

    margin-bottom:20px;

}

.btnImportar,
.btnExportar{

    flex:1;

    height:55px;

    border:none;

    border-radius:14px;

    color:white;

    font-weight:bold;

    font-size:16px;

}

.btnImportar{

    background:#ff6b00;

}

.btnExportar{

    background:#0F172A;

}

#arquivo{
    position:absolute;
    left:-9999px;
    width:1px;
    height:1px;
    opacity:0;
}
#clientes{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.cliente{

    background:white;
    border-radius:18px;
    padding:18px;

    box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.topo{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;

}

.nome{

    font-size:18px;
    font-weight:bold;
    color:#222;

}

.status{

    width:15px;
    height:15px;
    border-radius:50%;

}

.nao{

    background:#bbb;

}

.com{

    background:#20c55e;

}

.sem{

    background:#facc15;

}

.rotulo{

    font-size:11px;
    color:#888;
    text-transform:uppercase;
    margin-bottom:3px;

}

.valor{

    font-size:17px;
    color:#111;
    margin-bottom:12px;

}

.acoes{

    display:flex;
    justify-content:space-between;
    margin-top:12px;

}

.btnZap{

    width:82%;
    border:none;
    height:48px;
    border-radius:12px;
    background:#25D366;
    color:white;
    font-size:16px;
    font-weight:bold;

}

.menu{

    width:48px;
    border:none;
    border-radius:12px;
    background:#ececec;
    font-size:22px;

}

.dropdown-menu{

    border-radius:12px;

}

.dropdown-item{

    font-size:15px;
    padding:12px;

}

footer{

    text-align:center;
    color:#777;
    margin-top:20px;
    font-size:12px;

}

.destacado{

    border:3px solid #ff6b00;

    transform:scale(1.02);

    transition:.35s;

    box-shadow:0 0 18px rgba(255,107,0,.35);

}

.cardDash{

    cursor:pointer;

    transition:.25s;

}

.cardDash.ativo{

    background:#ff6b00;

    color:white;

}

.cardDash.ativo h2{

    color:white;

}

.cardDash.ativo span{

    color:white;

}

</style>

</head>

<body>

<header>

<img
    src="https://i.ibb.co/bM4HXvHD/Logo-VC.jpg"
    alt="VeloxConsig CRM"
    style="width:170px; max-width:90%; height:auto;"
    loading="eager">
	
</header>

<div class="container-fluid">

<div class="dashboard">

<div class="cardDash" onclick="aplicarFiltro('todos')" id="dashTodos">
<h2 id="total">0</h2>
<span>Total</span>
</div>

<div class="cardDash" onclick="aplicarFiltro('pendentes')" id="dashPendentes">
<h2 id="consultados">0</h2>
<span>Consultados</span>
</div>

<div class="cardDash" onclick="aplicarFiltro('com')" id="dashCom">
<h2 id="comMargem">0</h2>
<span>Com Margem</span>
</div>

<div class="cardDash" onclick="aplicarFiltro('sem')" id="dashSem">
<h2 id="semMargem">0</h2>
<span>Sem Margem</span>
</div>

</div>

<div class="importar">

<button
type="button"
class="btnImportar"
onclick="document.getElementById('arquivo').click()">

<i class="bi bi-upload"></i>

Importar

</button>

<input
id="arquivo"
type="file"
accept=".xlsx,.xls,.csv">    
	<button class="btnExportar" onclick="exportarPlanilha()">

        <i class="bi bi-download"></i>

        Exportar

    </button>
</div>

<div id="clientes">

<!-- cards -->

</div>

</div>

<footer>

VeloxConsig CRM Mobile

</footer>

<script>

let clientes = [];

let filtroAtual = "todos";

const arquivo = document.getElementById("arquivo");

arquivo.addEventListener("change", importarPlanilha);

function importarPlanilha(e){

    alert("Evento disparou");

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(evt){

        let workbook;

        try{

            if(typeof evt.target.result === "string"){

                workbook = XLSX.read(evt.target.result,{
                    type:"binary"
                });

            }else{

                workbook = XLSX.read(new Uint8Array(evt.target.result),{
                    type:"array"
                });

            }

        }catch(erro){

            alert("Não foi possível ler esta planilha.");

            console.error(erro);

            return;

        }

        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        const json = XLSX.utils.sheet_to_json(sheet,{
            defval:""
        });

        clientes = [];

        json.forEach(linha=>{

            const nome =
                linha.NOME ||
                linha.Nome ||
                linha.nome ||
                linha.CLIENTE ||
                linha.Cliente ||
                "";

            const cpf =
                linha.CPF ||
                linha.cpf ||
                "";

            const telefone =
                linha.TELEFONE ||
                linha.Telefone ||
                linha.telefone ||
                linha.CELULAR ||
                linha.Celular ||
                linha.celular ||
                "";

            if(nome === "") return;

            clientes.push({

                id: somenteNumeros(cpf),

                nome: nome,

                cpf: formatarCPF(cpf),

                telefone: formatarTelefone(telefone),

                status:
                    localStorage.getItem(
                        "status_" + somenteNumeros(cpf)
                    ) || "nao",

                data:
                    localStorage.getItem(
                        "data_" + somenteNumeros(cpf)
                    ) || "",

                hora:
                    localStorage.getItem(
                        "hora_" + somenteNumeros(cpf)
                    ) || ""

            });

        });

        clientes.sort((a,b)=>
            a.nome.localeCompare(b.nome)
        );

        renderizarCards();

        atualizarDashboard();

        e.target.value = "";

    };

    if(reader.readAsBinaryString){

        reader.readAsBinaryString(file);

    }else{

        reader.readAsArrayBuffer(file);

    }

}


function atualizarDashboard(){

    let total=clientes.length;

    let consultados=0;

    let com=0;

    let sem=0;

    clientes.forEach(c=>{

        if(c.status!="nao")
            consultados++;

        if(c.status=="com")
            com++;

        if(c.status=="sem")
            sem++;

    });

    document.getElementById("total").innerHTML=total;

    document.getElementById("consultados").innerHTML=consultados;

    document.getElementById("comMargem").innerHTML=com;

    document.getElementById("semMargem").innerHTML=sem;

}



function renderizarCards(){

    const lista = document.getElementById("clientes");

    lista.innerHTML = "";

    clientes.forEach(cliente=>{
		
		if(filtroAtual=="pendentes" && cliente.status!="nao")
		return;

		if(filtroAtual=="com" && cliente.status!="com")
		return;

		if(filtroAtual=="sem" && cliente.status!="sem")
		return;

        let corStatus="nao";

        if(cliente.status=="com") corStatus="com";

        if(cliente.status=="sem") corStatus="sem";

        lista.innerHTML += `

<div class="cliente">

    <div class="topo">

        <div class="nome">
            ${cliente.nome}
        </div>

        <div class="status ${corStatus}"></div>

    </div>

    <div class="rotulo">
        CPF
    </div>

    <div class="valor">
        ${cliente.cpf}
    </div>

    <div class="rotulo">
        Telefone
    </div>

    <div class="valor">
        ${cliente.telefone}
    </div>

    <div class="acoes">

        <button
            class="btnZap"
            onclick="abrirWhatsapp('${somenteNumeros(cliente.telefone)}')">

            <i class="bi bi-whatsapp"></i>

            WhatsApp

        </button>

        <div class="dropdown">

            <button
                class="menu"
                data-bs-toggle="dropdown">

                <i class="bi bi-three-dots-vertical"></i>

            </button>

            <ul class="dropdown-menu dropdown-menu-end">

                <li>

                    <a
                        class="dropdown-item"
                        href="javascript:void(0)"
                        onclick="event.preventDefault(); copiarCPF('${cliente.cpf}');">

                        <i class="bi bi-copy"></i>

                        Copiar CPF

                    </a>

                </li>

                <li>

                    <a
                        class="dropdown-item"
                        href="#"
                        onclick="alterarStatus('${cliente.id}','com')">

                        🟢 Com margem

                    </a>

                </li>

                <li>

                    <a
                        class="dropdown-item"
                        href="#"
                        onclick="alterarStatus('${cliente.id}','sem')">

                        🟡 Sem margem

                    </a>

                </li>

            </ul>

        </div>

    </div>

</div>

`;

    });

}

// =========================
// ABRIR WHATSAPP
// =========================

function abrirWhatsapp(numero){

    numero = String(numero).replace(/\D/g,'');

    if(numero.length==11){
        numero = "55"+numero;
    }

    if(numero.length==13 && numero.startsWith("55")){
        // já está no formato correto
    }

    window.open("https://wa.me/"+numero,"_blank");

}

// =========================
// COPIAR CPF
// =========================

function copiarCPF(cpf){

    const cpfLimpo = String(cpf).replace(/\D/g,'');

    const input = document.createElement("input");

    input.value = cpfLimpo;

    document.body.appendChild(input);

    input.select();

    input.setSelectionRange(0, 99999);

    document.execCommand("copy");

    document.body.removeChild(input);

    alert("CPF copiado!");

}

// =========================
// ALTERAR STATUS
// =========================

function alterarStatus(id,status){

    clientes.forEach(cliente=>{

        if(cliente.id==id){

cliente.status = status;

const agora = new Date();

cliente.data = agora.toLocaleDateString("pt-BR");

cliente.hora = agora.toLocaleTimeString("pt-BR", {
    hour: "2-digit",
    minute: "2-digit"
});

localStorage.setItem("status_" + id, status);
localStorage.setItem("data_" + id, cliente.data);
localStorage.setItem("hora_" + id, cliente.hora);
        }

    });

    renderizarCards();

    atualizarDashboard();

    if(filtroAtual=="todos"){

        setTimeout(function(){

            irParaProximoCliente(id);

        },150);

    }

}
// =========================
// ir Para Proximo Cliente
// =========================

function irParaProximoCliente(idAtual){

    const indiceAtual = clientes.findIndex(c => c.id == idAtual);

    if(indiceAtual == -1) return;

    const cards = document.querySelectorAll(".cliente");

    for(let i = indiceAtual + 1; i < clientes.length; i++){

        if(clientes[i].status == "nao"){

            if(cards[i]){

                cards[i].scrollIntoView({

                    behavior:"smooth",

                    block:"center"

                });
				
				if(navigator.vibrate){

					navigator.vibrate(80);

				}

                setTimeout(()=>{

                    cards[i].classList.add("destacado");

                    setTimeout(()=>{

                        cards[i].classList.remove("destacado");

                    },1200);

                },400);

            }

            return;

        }

    }

}
// ===============================
// APLICAR fILTRO
// ===============================

function aplicarFiltro(filtro){

    filtroAtual = filtro;

    document
        .querySelectorAll(".cardDash")
        .forEach(c=>c.classList.remove("ativo"));

    if(filtro=="todos")
        document.getElementById("dashTodos").classList.add("ativo");

    if(filtro=="pendentes")
        document.getElementById("dashPendentes").classList.add("ativo");

    if(filtro=="com")
        document.getElementById("dashCom").classList.add("ativo");

    if(filtro=="sem")
        document.getElementById("dashSem").classList.add("ativo");

    renderizarCards();
}	
// ===============================
// EXPORTAR PLANILHA
// ===============================

	
function exportarPlanilha(){

const dados = clientes.map(cliente => ({

    Nome: cliente.nome,

    CPF: cliente.cpf,

    Telefone: cliente.telefone,

    Status:
        cliente.status == "com"
            ? "COM"
            : cliente.status == "sem"
                ? "SEM"
                : "",

    Data: cliente.data,

    Hora: cliente.hora

}));
    const ws = XLSX.utils.json_to_sheet(dados);

    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "Clientes");

    XLSX.writeFile(wb,"Clientes_Atualizados.xlsx");

}

// ===============================
// FUNÇÕES AUXILIARES
// ===============================

function somenteNumeros(texto){
    return String(texto || "").replace(/\D/g,"");
}

function formatarTelefone(numero){

    numero = somenteNumeros(numero);

    if(numero.length==11){

        return "("+
            numero.substring(0,2)+") "+
            numero.substring(2,7)+"-"+
            numero.substring(7);

    }

    if(numero.length==10){

        return "("+
            numero.substring(0,2)+") "+
            numero.substring(2,6)+"-"+
            numero.substring(6);

    }

    return numero;

}

function formatarCPF(cpf){

    cpf = somenteNumeros(cpf);

    if(cpf.length!=11)
        return cpf;

    return cpf.replace(
        /(\d{3})(\d{3})(\d{3})(\d{2})/,
        "$1.$2.$3-$4"
    );

}



// ===============================
// AJUSTA DADOS IMPORTADOS
// ===============================

	



// ===============================
// MENSAGEM CASO NÃO TENHA DADOS
// ===============================

if(clientes.length===0){

    document.getElementById("clientes").innerHTML=`

        <div class="alert alert-warning text-center">

            Nenhum cliente encontrado na planilha.

        </div>

    `;

}



// ===============================
// GARANTE ATUALIZAÇÃO DO DASHBOARD
// ===============================

atualizarDashboard();



// ===============================
// GARANTE RENDERIZAÇÃO
// ===============================

renderizarCards();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
